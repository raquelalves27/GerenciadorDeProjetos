services:
  postgres:
    image: postgres:16-alpine
    container_name: implantacao_db
    environment:
      POSTGRES_DB: implantacao
      POSTGRES_USER: implantacao
      POSTGRES_PASSWORD: implantacao
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U implantacao']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: implantacao_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.12-slim
    container_name: implantacao_api
    working_dir: /app
    command: >
      bash -c "pip install --quiet -r requirements.txt &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://implantacao:implantacao@postgres:5432/implantacao
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: implantacao-secret-key-2026-change-in-prod
      DEBUG: 'true'
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: implantacao_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
